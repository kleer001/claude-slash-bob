<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" width="900" height="260">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;600&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="260" rx="12" fill="#ffffff"/>
  <rect width="900" height="260" rx="12" fill="none" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Symbol -->
  <circle cx="120" cy="130" r="100" fill="#1a1a1a"/>
  <text x="120" y="182"
        font-family="Noto Emoji, Noto Sans Symbols 2, Segoe UI Emoji, Apple Color Emoji, Symbola, sans-serif"
        font-size="130" fill="white" text-anchor="middle">🗘</text>

  <!-- Project name -->
  <text x="270" y="90"
        font-family="Inter, Helvetica, Arial, sans-serif"
        font-weight="600" font-size="52" fill="#1a1a1a">/bob</text>

  <!-- Tagline 1 -->
  <text x="270" y="148"
        font-family="Inter, Helvetica, Arial, sans-serif"
        font-weight="600" font-size="26" fill="#1a1a1a">Close the session. Keep the thread.</text>

  <!-- Tagline 2 -->
  <text x="270" y="192"
        font-family="Inter, Helvetica, Arial, sans-serif"
        font-weight="300" font-size="20" fill="#555555">Compress. Save. Resume.</text>

  <!-- Accent line -->
  <rect x="270" y="213" width="100" height="2" rx="1" fill="#1a1a1a" opacity="0.5"/>
</svg>
